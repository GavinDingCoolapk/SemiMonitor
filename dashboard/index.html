<style>
  :root {
    --bg: #FAFBFC;
    --surface: #FFFFFF;
    --border: #E8ECF0;
    --text: #1A1D21;
    --text-2: #5F6872;
    --text-3: #8B95A1;
    --accent: #0066FF;
    --accent-light: #E8F0FE;
    --green: #00A858;
    --green-bg: #E6F9EF;
    --red: #E8413C;
    --red-bg: #FEF0EF;
    --yellow: #D4940A;
    --yellow-bg: #FFF9E6;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
  }
  .logo h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .logo h1 span {
    color: var(--text-3);
    font-weight: 400;
    margin-left: 8px;
    font-size: 13px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    color: var(--text-3);
  }
  .header-meta .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  /* ── Layout ── */
  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text-2); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Section titles ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-3);
    margin-bottom: 12px;
  }

  /* ── Filter bar ── */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    margin-right: 4px;
  }
  .filter-btn {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── News Feed ── */
  .news-feed {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .news-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    transition: all 0.15s ease;
    color: inherit;
    display: block;
  }
  .news-item:hover {
    box-shadow: var(--shadow-hover);
    border-color: #D0D5DD;
  }
  .news-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .news-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    flex: 1;
    color: var(--accent);
    text-decoration: none;
  }
  .news-title:hover {
    text-decoration: underline;
  }
  .news-time {
    font-size: 12px;
    color: var(--text-3);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .news-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .news-source {
    font-size: 12px;
    color: var(--text-2);
    font-weight: 500;
  }

  /* Tags */
  .tag {
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .tag-gpu { background: #EDE9FE; color: #7C3AED; }
  .tag-cpu { background: #E0F2FE; color: #0369A1; }
  .tag-hbm { background: #FEF3C7; color: #B45309; }
  .tag-ssd { background: #DBEAFE; color: #1D4ED8; }
  .tag-optical { background: #D1FAE5; color: #065F46; }
  .tag-network { background: #FCE7F3; color: #BE185D; }
  .tag-foundry { background: #FEE2E2; color: #B91C1C; }
  .tag-capex { background: #E0E7FF; color: #4338CA; }
  .tag-ml_model { background: #CCFBF1; color: #0F766E; }
  .tag-pcb { background: #F3F4F6; color: #374151; }
  .tag-mlcc { background: #FEF9C3; color: #854D0E; }
  .tag-power { background: #FFE4E6; color: #9F1239; }
  .tag-generic { background: #F3F4F6; color: #6B7280; }

  .impact {
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: auto;
  }
  .impact-bullish { background: var(--green-bg); color: var(--green); }
  .impact-bearish { background: var(--red-bg); color: var(--red); }
  .impact-neutral { background: #F3F4F6; color: var(--text-3); }

  /* Hover expand */
  .news-expand {
    padding-top: 12px;
  }
  .news-expand-inner {
    border-top: 1px solid #F3F4F6;
    padding-top: 10px;
  }
  .news-analysis {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  /* Chain */
  .chain {
    display: flex;
    align-items: stretch;
    gap: 0;
    background: #F8FAFB;
    border-radius: 6px;
    padding: 10px 14px;
    overflow-x: auto;
  }
  .chain-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    min-width: 80px;
    text-align: center;
  }
  .chain-step-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }
  .chain-step-label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 500;
    line-height: 1.3;
  }
  .chain-step-detail {
    font-size: 10px;
    color: var(--text-3);
  }
  .chain-arrow {
    display: flex;
    align-items: center;
    color: var(--text-3);
    font-size: 14px;
    padding: 0 6px;
    flex-shrink: 0;
    padding-top: 10px;
  }

  .chain-up .chain-step-icon { background: var(--green-bg); color: var(--green); }
  .chain-down .chain-step-icon { background: var(--red-bg); color: var(--red); }
  .chain-flat .chain-step-icon { background: #F3F4F6; color: var(--text-3); }

  /* ── Company tab ── */
  .category-section {
    margin-bottom: 28px;
  }
  .category-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .company-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: box-shadow 0.15s ease;
  }
  .company-card:hover { box-shadow: var(--shadow); }

  .company-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .company-name {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .company-ticker {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    background: #F3F4F6;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .stock-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 4px;
  }
  .stock-bullish { background: var(--green-bg); color: var(--green); }
  .stock-bearish { background: var(--red-bg); color: var(--red); }
  .stock-neutral { background: #F3F4F6; color: var(--text-3); }

  .company-components {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .company-metrics {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .metric {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
  }
  .metric-label { font-size: 10px; color: var(--text-3); }
  .metric-value {
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .arrow-up { color: var(--green); }
  .arrow-down { color: var(--red); }
  .arrow-flat { color: var(--text-3); }

  .company-reasoning {
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.5;
    padding-top: 10px;
    border-top: 1px solid #F3F4F6;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .container { padding: 16px; }
    .header { padding: 16px; }
    .header-inner { flex-direction: column; gap: 8px; align-items: flex-start; }
    .company-grid { grid-template-columns: 1fr; }
    .company-metrics { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

// ─── Helpers ───
const TAG_CLASS = {
  gpu: "tag-gpu", cpu: "tag-cpu", hbm: "tag-hbm", ssd: "tag-ssd",
  optical: "tag-optical", network: "tag-network", foundry: "tag-foundry",
  capex: "tag-capex", ml_model: "tag-ml_model", pcb: "tag-pcb",
  mlcc: "tag-mlcc", power: "tag-power"
};
const TAG_LABEL = {
  gpu: "GPU", cpu: "CPU", hbm: "HBM", ssd: "SSD",
  optical: "光芯片", network: "网络", foundry: "代工",
  capex: "Capex", ml_model: "AI模型", pcb: "PCB",
  mlcc: "MLCC", power: "电源"
};
const ARROW = { up: "↑", down: "↓", flat: "→" };
const ARROW_CLASS = { up: "arrow-up", down: "arrow-down", flat: "arrow-flat" };

// ─── Tabs ───
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
  });
});

// ─── Filters ───
let activeFilter = "all";

function renderFilters() {
  const bar = document.getElementById("filter-bar");
  const types = ["all", ...new Set(DEMO_NEWS.flatMap(n => n.component_type || []))];
  bar.innerHTML = `<span class="filter-label">筛选</span>` +
    types.map(t => `<button class="filter-btn ${t === activeFilter ? 'active' : ''}" data-filter="${t}">${t === 'all' ? '全部' : TAG_LABEL[t] || t}</button>`).join("");
  bar.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeFilter = btn.dataset.filter; renderFilters(); renderNews(); });
  });
}

// ─── News ───
function renderNews() {
  const feed = document.getElementById("news-feed");
  const filtered = activeFilter === "all"
    ? DEMO_NEWS
    : DEMO_NEWS.filter(n => (n.component_type || []).includes(activeFilter));

  feed.innerHTML = filtered.map(n => {
    const tags = (n.component_type || []).map(t =>
      `<span class="tag ${TAG_CLASS[t] || 'tag-generic'}">${TAG_LABEL[t] || t}</span>`
    ).join("");

    const impactClass = n.impact === "bullish" ? "impact-bullish"
      : n.impact === "bearish" ? "impact-bearish" : "impact-neutral";
    const impactLabel = n.impact === "bullish" ? "利好"
      : n.impact === "bearish" ? "利空" : "中性";

    const time = n.published_at
      ? new Date(n.published_at).toLocaleString("zh-CN", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })
      : "";

    const chainDir = n.impact === "bearish" ? "chain-down" : n.impact === "bullish" ? "chain-up" : "chain-flat";
    const chainHTML = n.chain ? `
      <div class="chain ${chainDir}">
        ${n.chain.map((s, i) => `
          <div class="chain-step">
            <div class="chain-step-icon">${s.icon}</div>
            <div class="chain-step-label">${s.label}</div>
            <div class="chain-step-detail">${s.detail}</div>
          </div>
          ${i < n.chain.length - 1 ? '<div class="chain-arrow">→</div>' : ''}
        `).join("")}
      </div>
    ` : "";

    return `<div class="news-item">
      <div class="news-header">
        <a class="news-title" href="${n.source_url}" target="_blank" rel="noopener">${n.title}</a>
        <div class="news-time">${time}</div>
      </div>
      <div class="news-meta">
        <span class="news-source">${n.source}</span>
        ${tags}
        <span class="impact ${impactClass}">${impactLabel}</span>
      </div>
      <div class="news-expand">
        <div class="news-expand-inner">
          ${n.analysis ? `<div class="news-analysis">${n.analysis}</div>` : ""}
          ${chainHTML}
        </div>
      </div>
    </div>`;
  }).join("");
}

// ─── Companies ───
function renderCompanies() {
  const list = document.getElementById("company-list");
  list.innerHTML = Object.entries(DEMO_COMPANIES).map(([category, companies]) => `
    <div class="category-section">
      <div class="category-title">${category}</div>
      <div class="company-grid">
        ${companies.map(c => {
          const stockClass = c.stock === "bullish" ? "stock-bullish"
            : c.stock === "bearish" ? "stock-bearish" : "stock-neutral";
          const stockLabel = c.stock === "bullish" ? "看涨"
            : c.stock === "bearish" ? "看跌" : "中性";
          const metrics = [
            { label: "出货量", value: c.shipment },
            { label: "ASP", value: c.asp },
            { label: "成本", value: c.cost },
            { label: "营收", value: c.revenue },
            { label: "毛利率", value: c.margin },
          ];
          return `<div class="company-card">
            <div class="company-header">
              <div class="company-name">
                ${c.name}
                <span class="company-ticker">${c.ticker}</span>
              </div>
              <span class="stock-badge ${stockClass}">${stockLabel}</span>
            </div>
            <div class="company-components">
              ${c.components.map(comp => `<span class="tag tag-generic">${comp}</span>`).join("")}
            </div>
            <div class="company-metrics">
              ${metrics.map(m => `<div class="metric">
                <span class="metric-label">${m.label}</span>
                <span class="metric-value ${ARROW_CLASS[m.value]}">${ARROW[m.value]}</span>
              </div>`).join("")}
            </div>
            <div class="company-reasoning">${c.reasoning}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  `).join("");
}

// Init
renderFilters();
renderNews();
renderCompanies();
